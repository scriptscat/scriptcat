name: "🕷️ Bug Report"
description: Report bugs in ScriptCat itself, extension UI, sync, installation, scheduled/background scripts, etc.
title: "[BUG] "
type: "Bug"
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please describe the reproduction steps and version information as clearly as you can.

        If a specific userscript works in Tampermonkey / Violentmonkey but not in ScriptCat, please use the **Userscript Compatibility** template instead.

  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-check
      options:
        - label: I have searched existing issues, and confirmed the problem still happens on the latest stable or beta version where possible.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Description
      description: What actually happened, and what did you expect to happen?
      placeholder: |
        Example: On Edge for Android, opening the ScriptCat popup and tapping "Import file" shows the file picker, but nothing happens after selecting a file.

        Expected:
        Actual:
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Please write steps someone else can follow.
      placeholder: |
        1. Install ScriptCat v...
        2. Open ...
        3. Click ...
        4. Observe ...
    validations:
      required: true

  - type: input
    id: scriptcat-version
    attributes:
      label: ScriptCat Version
      placeholder: "Example: v1.4.0 / v1.4.0-beta / Firefox MV2 v0.16.15"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: OS / Browser and Version
      placeholder: "Example: Windows 11 + Chrome 143 / Android 16 + Edge 146 / macOS + Firefox 151"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Related Script / Logs / Screenshots
      description: Installation URL or metadata of the related script, console or Service Worker logs, and screenshots. Please redact sensitive information first.
      placeholder: |
        Script URL / target website:
        Logs (source: page DevTools / Service Worker / offscreen / popup):
        Screenshots:
    validations:
      required: false
