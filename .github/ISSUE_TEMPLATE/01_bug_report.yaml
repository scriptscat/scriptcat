name: "🕷️ Bug 反馈"
description: ScriptCat 本体、扩展界面、同步、安装、定时/后台脚本等异常
title: "[BUG] "
type: "Bug"
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量写清复现步骤和版本信息。

        如果是某个用户脚本在 ScriptCat 不兼容、但在 Tampermonkey/Violentmonkey 正常，请改用 “Userscript 兼容性问题” 模板。

  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过现有 issues，并尽量用最新 stable 或 beta 版本确认问题仍然存在
          required: true

  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 实际发生了什么？你原本期望发生什么？
      placeholder: |
        例：在 Edge Android 上打开 ScriptCat popup 后点击“导入文件”，文件选择器出现但选择后没有任何反应。

        期望：
        实际：
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请写成别人可以照着操作的步骤。
      placeholder: |
        1. 安装 ScriptCat v...
        2. 打开 ...
        3. 点击 ...
        4. 观察到 ...
    validations:
      required: true

  - type: input
    id: scriptcat-version
    attributes:
      label: ScriptCat 版本
      placeholder: "例如：v1.4.0 / v1.4.0-beta / Firefox MV2 v0.16.15"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: 系统 / 浏览器及版本
      placeholder: "例如：Windows 11 + Chrome 143 / Android 16 + Edge 146 / macOS + Firefox 151"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: 相关脚本 / 日志 / 截图
      description: 相关脚本的安装链接或 metadata、控制台或 Service Worker 日志、截图。敏感信息请先脱敏。
      placeholder: |
        脚本链接 / 目标网站：
        日志（来源：页面 DevTools / Service Worker / offscreen / popup）：
        截图：
    validations:
      required: false
