name: "📚 Documentation"
description: Report ScriptCat documentation errors, outdated content, missing explanations, broken examples, or documentation structure improvements.
title: "[Docs] "
type: "Task"
labels: ["documentation"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ScriptCat documentation.

        If this is about UI translation, language packs, or localization wording, please use the **Translation / i18n** template instead.

  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-check
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true

  - type: input
    id: doc-url
    attributes:
      label: Related Documentation Page
      description: Please provide the related docs.scriptcat.org, learn.scriptcat.org, README, CONTRIBUTING, or other page.
    validations:
      required: true

  - type: textarea
    id: current-problem
    attributes:
      label: Current Problem
      description: Please explain what is wrong with the current documentation.
      placeholder: |
        Example: This page still describes the old sync flow, but the current settings page has changed to ...
    validations:
      required: true

  - type: textarea
    id: expected-change
    attributes:
      label: Suggested Change
      description: Please describe how the documentation should be changed. You may paste suggested wording directly.
      placeholder: |
        Suggested wording:
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Screenshots, related issues, PRs, code locations, or references can be added here.
    validations:
      required: false
