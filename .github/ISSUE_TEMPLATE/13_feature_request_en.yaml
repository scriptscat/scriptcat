name: "⭐ Feature Request"
description: Request a new or improved ScriptCat feature, API, UI, sync behavior, editor behavior, etc.
title: "[Feature] "
type: "Feature"
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Please describe the real problem you want to solve, not just a button name or an API name.

        If something is broken, or used to work and no longer does, please use the Bug Report template instead.

  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-check
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate feature request.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: The Problem You Want to Solve
      description: What is painful for you or for script authors without this feature?
      placeholder: |
        Example: I have many scheduled check-in scripts, and I currently have to open each script's log to find out whether it ran successfully.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      placeholder: |
        Example: Add "last run time" and "last run result" columns to the script list, and show a failure count badge on the extension icon.
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Optionally add a proposed API shape, how other userscript managers handle this, screenshots, or reference links.
      placeholder: |
        API draft / reference implementation / screenshots:
    validations:
      required: false
