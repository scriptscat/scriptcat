name: "⭐ 功能请求"
description: 请求新增或改进 ScriptCat 功能、API、UI、同步、编辑器等
title: "[Feature] "
type: "Feature"
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        请描述你真正想解决的问题，而不只是描述一个按钮或 API 名称。

        如果某个功能失效、或者以前能用现在不行，请改用 Bug 反馈模板。

  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过现有 issues，确认不是重复的功能请求
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 没有这个功能时，你或脚本作者会遇到什么麻烦？
      placeholder: |
        例：我有很多定时签到脚本，目前必须逐个打开日志才能确认运行结果。
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 期望的解决方案
      placeholder: |
        例：在脚本列表增加“上次运行时间”和“最近运行结果”列，失败时在扩展图标显示失败数量。
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: 补充信息
      description: 可以补充 API 草案、其他脚本管理器的做法、截图或参考链接。
      placeholder: |
        API 草案 / 参考实现 / 截图：
    validations:
      required: false
