name: "⭐ 功能请求"
description: 请求新增或改进 ScriptCat 功能、API、UI、同步、编辑器等
title: "[Feature] "
type: "Feature"
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        本模板仅用于提交尚不存在的新能力。

        如果某个功能无法使用、以前可以使用但现在失效，或行为与你的预期不一致，请改用 Bug 模板。即使是功能请求，也必须填写浏览器和 ScriptCat 版本，以便维护者判断这是版本相关的 bug，还是确实缺少功能。

        请描述你真正想解决的问题，而不只是描述一个按钮或 API 名称。
        如果是 GM/CAT API 设计，建议给出 API 草案、兼容对象和安全影响。

  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过现有 issues，确认不是重复功能请求
          required: true
        - label: 我已经确认这不是 bug；如果是异常行为，应使用 Bug 模板
          required: true

  - type: input
    id: browser-version
    attributes:
      label: 浏览器及版本
      description: 请填写需要此功能的浏览器及其完整版本；如涉及多个浏览器，请全部列出。
      placeholder: "例如：Chrome 138.0.7204.101；Firefox 140.0.2"
    validations:
      required: true

  - type: input
    id: scriptcat-version
    attributes:
      label: ScriptCat 版本
      description: 可在扩展详情或关于页面查看，请不要只填写“最新版”。
      placeholder: "例如：v0.17.0 或 commit/build 标识"
    validations:
      required: true

  - type: dropdown
    id: expected-existing-behavior
    attributes:
      label: 你是否原本认为这个功能已经存在？
      description: 此项用于区分缺少新功能、现有功能异常和回归问题。
      options:
        - 否，我请求的是一个全新的能力
        - 是，我原本认为 ScriptCat 已支持；我会在下方说明为什么这不是 bug
    validations:
      required: true

  - type: dropdown
    id: feature-area
    attributes:
      label: 功能领域
      multiple: true
      options:
        - 用户脚本管理 / 列表 / 分组 / 搜索
        - 脚本安装 / 更新 / 订阅
        - 脚本匹配 / 排除 / 权限管理
        - GM API / CAT API
        - 后台脚本 / 定时脚本
        - Cloud Sync / 备份 / 恢复 / 迁移
        - Popup / Options / UI
        - 内置编辑器 / Monaco / ESLint / VSCode 插件
        - 日志 / 调试 / 开发者体验
        - 移动端适配
        - 国际化 / 翻译
        - 性能 / 存储 / 安全
        - 其他
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: 当前行为和已尝试的方法
      description: 请说明 ScriptCat 当前的行为、你尝试过的方法，以及现有流程为什么无法满足需求。如果某项操作失败或以前可以使用，请改用 Bug 模板。
      placeholder: |
        当前行为：
        已尝试的步骤或替代方案：
        现有行为无法满足需求的原因：
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 你遇到的实际问题
      description: 没有这个功能时，用户或脚本作者会遇到什么痛点？
      placeholder: |
        例：我有很多定时签到脚本，目前必须逐个打开日志才能确认运行结果。
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 期望的解决方案
      placeholder: |
        例：在脚本列表增加“上次运行时间”和“最近运行结果”列，失败时在扩展图标显示失败数量。
    validations:
      required: true

  - type: textarea
    id: api-design
    attributes:
      label: API / UI 草案（如适用）
      description: 如果涉及 GM/CAT API、配置结构、同步格式、UI 流程，请给出草案。
      placeholder: |
        ```ts
        // API 草案
        ```
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否已有 workaround？其他扩展是如何处理的？
      placeholder: |
        Tampermonkey / Violentmonkey / FireMonkey / Soulsign / Automa 等参考：
    validations:
      required: false

  - type: textarea
    id: compatibility
    attributes:
      label: 兼容性和安全影响
      description: 是否影响 MV2/MV3、Firefox、移动端、隐身模式、站点权限、用户脚本权限？
      placeholder: |
        可能影响：
        需要新增权限：
        是否可能被恶意脚本滥用：
    validations:
      required: false
