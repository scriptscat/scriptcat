name: "🌐 翻译 / 本地化"
description: 报告 ScriptCat 界面、文档或语言包的翻译问题，或请求新增/改进语言支持
title: "[i18n] "
type: "Task"
labels: ["i18n", "translation"]

body:
  - type: markdown
    attributes:
      value: |
        感谢帮助改进 ScriptCat 的本地化。

        如果是文档内容本身错误、过期或缺失，请改用 “文档问题 / 改进” 模板。

  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过现有 issues，确认不是重复问题
          required: true

  - type: dropdown
    id: language
    attributes:
      label: 语言
      options:
        - 简体中文 / zh-CN
        - 繁體中文 / zh-TW
        - English / en
        - 日本語 / ja
        - Русский / ru
        - Deutsch / de
        - Tiếng Việt / vi
        - 新增语言请求 / New language request
        - 其他 / Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: 出现位置
      description: 请提供页面、菜单路径、文件路径或文档页面。
      placeholder: "例如：Options > Settings > Script Sync / src/locales/<locale>/translation.json"
    validations:
      required: true

  - type: textarea
    id: source-text
    attributes:
      label: 当前文案
      description: 请贴出你看到的原文或当前翻译。
    validations:
      required: true

  - type: textarea
    id: suggested-text
    attributes:
      label: 建议译文
      description: 请提供你建议使用的翻译；如果是新增语言请求，请说明目标语言和是否愿意贡献。
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: 修改理由 / 截图
      description: 为什么当前翻译不合适？是否涉及术语、上下文或地区用语？如果涉及 UI 溢出或截断，请上传截图。
      placeholder: |
        例：这里的 “sync” 在产品中统一译为 “同步”，不应译为 “备份”。
    validations:
      required: false
