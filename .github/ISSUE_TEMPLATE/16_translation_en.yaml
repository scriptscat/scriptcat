name: "🌐 Translation / Localization"
description: Report translation issues in ScriptCat UI, documentation, or language files, or request new/improved language support.
title: "[i18n] "
type: "Task"
labels: ["i18n", "translation"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ScriptCat localization.

        If the documentation content itself is incorrect, outdated, or missing, please use the **Documentation** template instead.

  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-check
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true

  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - Simplified Chinese / zh-CN
        - Traditional Chinese / zh-TW
        - English / en
        - Japanese / ja
        - Russian / ru
        - German / de
        - Vietnamese / vi
        - New language request
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: Please provide the page, menu path, file path, or documentation page.
      placeholder: "Example: Options > Settings > Script Sync / src/locales/<locale>/translation.json"
    validations:
      required: true

  - type: textarea
    id: source-text
    attributes:
      label: Current Text
      description: Please paste the source text or current translation you see.
    validations:
      required: true

  - type: textarea
    id: suggested-text
    attributes:
      label: Suggested Translation
      description: Please provide the wording you suggest. For new language requests, mention the target language and whether you are willing to contribute.
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Reason / Screenshots
      description: Why is the current translation unsuitable? Does it involve terminology, context, or regional wording? If it involves UI overflow or truncation, please attach screenshots.
      placeholder: |
        Example: In this product, "sync" is consistently translated one way, so this string should not use a different term.
    validations:
      required: false
