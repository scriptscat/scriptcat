name: "🧑‍💻 技术方案 / 重构提案"
description: 面向维护者和贡献者的架构、性能、存储、API 语义、重构提案
title: "[Proposal] "
type: "Task"
labels: ["proposal", "technical"]

body:
  - type: markdown
    attributes:
      value: |
        这个模板用于技术设计、重构、性能优化、存储结构、运行时架构等提案。

        普通用户 bug 或功能请求请使用其他模板。

  - type: textarea
    id: background
    attributes:
      label: 背景问题
      description: 当前实现有什么限制、bug、性能问题或维护成本？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 具体方案
      description: 请尽量写清数据结构、流程、API、迁移策略。
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 兼容性 / 迁移 / 测试
      placeholder: |
        对旧版本数据的影响：
        对 MV2/MV3、Firefox/Chrome/Edge/移动端的影响：
        是否需要 migration：
        测试与回归风险：
    validations:
      required: false
