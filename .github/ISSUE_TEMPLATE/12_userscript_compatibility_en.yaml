name: "🧩 Userscript Compatibility"
description: Report userscripts that fail in ScriptCat but work in Tampermonkey, Violentmonkey, or other managers.
title: "[Compatibility] "
type: "Bug"
labels: ["compatibility", "userscript"]

body:
  - type: markdown
    attributes:
      value: |
        This template is specifically for **userscript compatibility issues**.

        If the issue is about ScriptCat UI, sync, backup, installation, or general extension behavior, please use the Bug Report template instead.

  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-check
      options:
        - label: I have searched existing issues, and confirmed this is related to a userscript or userscript API.
          required: true

  - type: input
    id: script-url
    attributes:
      label: Userscript URL
      placeholder: "GreasyFork / OpenUserJS / GitHub raw / scriptcat.org / other"
    validations:
      required: true

  - type: input
    id: target-url
    attributes:
      label: Target Website Where the Issue Occurs
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Behavior and Comparison
      description: What happens in ScriptCat, and what happens in other userscript managers? Please name the manager and version you compared against.
      placeholder: |
        In ScriptCat: button never appears / script does not run / GM_xmlhttpRequest throws / page reloads endlessly
        In another manager (e.g. Tampermonkey 5.x): works fine
    validations:
      required: true

  - type: textarea
    id: metadata
    attributes:
      label: Userscript Metadata
      description: Please include at least the relevant `@match`, `@grant`, `@connect`, `@require`, `@resource`, `@run-at`, and `@inject-into` entries.
      render: javascript
      placeholder: |
        // ==UserScript==
        // @name ...
        // @match ...
        // @grant ...
        // @connect ...
        // ==/UserScript==
    validations:
      required: true

  - type: input
    id: scriptcat-version
    attributes:
      label: ScriptCat Version
      placeholder: "Example: v1.4.0 / v1.4.0-beta / Firefox MV2 v0.16.15"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: OS / Browser and Version
      placeholder: "Example: Windows 11 + Chrome 143 / macOS + Firefox 151 / Android + WebLibre 0.20"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Minimal Reproduction Script / Logs / Screenshots
      description: If the original script is large, please reduce it to a minimal reproduction. For logs, note where they came from — page console, content script, Service Worker, offscreen, network panel, etc.
      placeholder: |
        Minimal reproduction script:
        Log source and error message:
        Screenshots / video:
    validations:
      required: false
