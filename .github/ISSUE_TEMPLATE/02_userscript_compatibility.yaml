name: "🧩 Userscript 兼容性问题"
description: 某个用户脚本在 ScriptCat 中异常，但在 Tampermonkey / Violentmonkey / 其他管理器中正常
title: "[Compatibility] "
type: "Bug"
labels: ["compatibility", "userscript"]

body:
  - type: markdown
    attributes:
      value: |
        这个模板专门用于 **用户脚本兼容性**。
        请尽量提供脚本链接、目标网站、metadata、对比结果和最小复现脚本。
        如果只是 ScriptCat 界面或同步功能异常，请使用 Bug 反馈模板。

  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过现有 issues
          required: true
        - label: 我确认该问题与某个用户脚本或 userscript API 兼容性有关
          required: true
        - label: 我已经尽量提供脚本链接或最小复现脚本
          required: true

  - type: input
    id: script-url
    attributes:
      label: 用户脚本链接
      placeholder: "GreasyFork / OpenUserJS / GitHub raw / scriptcat.org / 其他"
    validations:
      required: true

  - type: input
    id: target-url
    attributes:
      label: 触发问题的目标网站
      placeholder: "例如： <target website URL>"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 在 ScriptCat 中的异常表现
      placeholder: |
        例：按钮不出现 / 脚本不执行 / GM_xmlhttpRequest 报错 / 菜单项无效 / 页面无限刷新
    validations:
      required: true

  - type: textarea
    id: comparison
    attributes:
      label: 与其他用户脚本管理器的对比
      description: 请写清楚 Tampermonkey / Violentmonkey / FireMonkey / Greasemonkey 的结果。
      placeholder: |
        Tampermonkey 版本：
        Violentmonkey 版本：
        FireMonkey/Greasemonkey 版本：
        在这些管理器中的表现：
    validations:
      required: true

  - type: textarea
    id: metadata
    attributes:
      label: 用户脚本 metadata
      description: 请至少提供 `@match`、`@grant`、`@connect`、`@require`、`@resource`、`@run-at`、`@inject-into` 等相关字段。
      render: javascript
      placeholder: |
        // ==UserScript==
        // @name ...
        // @match ...
        // @grant ...
        // @connect ...
        // ==/UserScript==
    validations:
      required: true

  - type: textarea
    id: minimal-reproduction
    attributes:
      label: 最小复现脚本
      description: 如果原脚本太大，请尽量删减成最小可复现版本。
      render: javascript
      placeholder: |
        // 尽量提供能单独复现问题的最小脚本
    validations:
      required: false

  - type: dropdown
    id: api-area
    attributes:
      label: 可能相关的 API / 机制
      multiple: true
      options:
        - GM_xmlhttpRequest / GM.xmlHttpRequest
        - GM_getValue / GM.setValue / GM storage
        - GM_registerMenuCommand
        - GM_download
        - GM_cookie / Cookie API
        - "@match / @include / @exclude"
        - "@connect"
        - "@require / @resource"
        - "@run-at"
        - "@inject-into"
        - sandbox / unsafeWindow / page context
        - iframe / allFrames / noframes
        - CSP / Trusted Types
        - service worker / offscreen / background
        - 不确定
    validations:
      required: true

  - type: input
    id: scriptcat-version
    attributes:
      label: ScriptCat 版本
      placeholder: "例如：v1.4.0 / v1.4.0-beta / Firefox MV2 v0.16.15"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: 操作系统和浏览器
      placeholder: "例如：Windows 11 Chrome 143 / macOS Firefox 151 / Android WebLibre 0.20"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 控制台日志 / 网络请求 / 截图
      description: 请说明日志来源：页面 console、content script、service worker、offscreen、网络面板等。
      placeholder: |
        日志来源：
        错误：
        截图/视频：
    validations:
      required: false
