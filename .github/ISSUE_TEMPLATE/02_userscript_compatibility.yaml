name: "🧩 Userscript 兼容性问题"
description: 某个用户脚本在 ScriptCat 中异常，但在 Tampermonkey / Violentmonkey / 其他管理器中正常
title: "[Compatibility] "
type: "Bug"
labels: ["compatibility", "userscript"]

body:
  - type: markdown
    attributes:
      value: |
        这个模板专门用于 **用户脚本兼容性**。

        如果只是 ScriptCat 界面、同步、安装等本体功能异常，请改用 Bug 反馈模板。

  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过现有 issues，并确认问题与某个用户脚本或 userscript API 有关
          required: true

  - type: input
    id: script-url
    attributes:
      label: 用户脚本链接
      placeholder: "GreasyFork / OpenUserJS / GitHub raw / scriptcat.org / 其他"
    validations:
      required: true

  - type: input
    id: target-url
    attributes:
      label: 触发问题的目标网站
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题表现与对比
      description: 在 ScriptCat 中是什么表现？在其他脚本管理器中又是什么表现？请注明对比用的管理器和版本。
      placeholder: |
        在 ScriptCat 中：按钮不出现 / 脚本不执行 / GM_xmlhttpRequest 报错 / 页面无限刷新
        在其他管理器中（如 Tampermonkey 5.x）：正常
    validations:
      required: true

  - type: textarea
    id: metadata
    attributes:
      label: 用户脚本 metadata
      description: 请至少提供 `@match`、`@grant`、`@connect`、`@require`、`@resource`、`@run-at`、`@inject-into` 等相关字段。
      render: javascript
      placeholder: |
        // ==UserScript==
        // @name ...
        // @match ...
        // @grant ...
        // @connect ...
        // ==/UserScript==
    validations:
      required: true

  - type: input
    id: scriptcat-version
    attributes:
      label: ScriptCat 版本
      placeholder: "例如：v1.4.0 / v1.4.0-beta / Firefox MV2 v0.16.15"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: 系统 / 浏览器及版本
      placeholder: "例如：Windows 11 + Chrome 143 / macOS + Firefox 151 / Android + WebLibre 0.20"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: 最小复现脚本 / 日志 / 截图
      description: 如果原脚本太大，请尽量删减成最小可复现版本。日志请注明来源：页面 console、content script、Service Worker、offscreen、网络面板等。
      placeholder: |
        最小复现脚本：
        日志来源与错误信息：
        截图 / 视频：
    validations:
      required: false
