name: "📚 文档问题 / 改进"
description: 报告 ScriptCat 文档错误、过期内容、缺失说明、示例不可用或文档结构改进
title: "[Docs] "
type: "Task"
labels: ["documentation"]

body:
  - type: markdown
    attributes:
      value: |
        感谢帮助改进 ScriptCat 文档。

        如果是界面翻译、语言包、本地化措辞问题，请改用 “翻译 / 本地化” 模板。

  - type: checkboxes
    id: precheck
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过现有 issues，确认不是重复问题
          required: true

  - type: input
    id: doc-url
    attributes:
      label: 相关文档页面
      description: 请提供 docs.scriptcat.org、learn.scriptcat.org、README、CONTRIBUTING 或其他相关页面。
    validations:
      required: true

  - type: textarea
    id: current-problem
    attributes:
      label: 当前问题
      description: 请说明目前文档哪里有问题。
      placeholder: |
        例：该页面仍然描述旧版同步流程，但当前设置页面已经改为 ...
    validations:
      required: true

  - type: textarea
    id: expected-change
    attributes:
      label: 建议修改
      description: 请说明你希望如何修改文档。可以直接贴出建议文案。
      placeholder: |
        建议改为：
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: 补充信息
      description: 可以补充截图、相关 issue、PR、代码位置或参考资料。
    validations:
      required: false
