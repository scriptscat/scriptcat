name: Auto_Package

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
        run: |
          corepack enable
          corepack install
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Package with Node
        env:
          CHROME_PEM: ${{ secrets.CHROME_PEM }}
        run: |
          mkdir dist
          echo "$CHROME_PEM" > ./dist/scriptcat.pem
          chmod 600 ./dist/scriptcat.pem
          pnpm i --frozen-lockfile
          pnpm test
          pnpm run pack

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "./dist/*.zip,./dist/*.crx"
