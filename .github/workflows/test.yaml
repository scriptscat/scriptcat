name: test

on:
  push:
    branches:
      - main
      - release/*
      - develop/*
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup pnpm
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
        run: |
          corepack enable
          corepack install
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Cache ESLint cache
        uses: actions/cache@v6
        with:
          path: .eslintcache
          key: eslint-${{ hashFiles('pnpm-lock.yaml', '.eslintrc*') }}
          restore-keys: |
            eslint-

      - name: Lint
        run: pnpm lint:ci

  test-shards:
    runs-on: ubuntu-latest
    name: Run test shard (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup pnpm
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
        run: |
          corepack enable
          corepack install
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run test shard
        run: >
          pnpm exec vitest run --coverage --silent --reporter=blob --shard=${{ matrix.shardIndex }}/${{
          matrix.shardTotal }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: vitest-report-${{ matrix.shardIndex }}
          path: .vitest-reports/*
          include-hidden-files: true
          retention-days: 1

  tests:
    runs-on: ubuntu-latest
    name: Run tests
    needs: [lint, test-shards]
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup pnpm
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
        run: |
          corepack enable
          corepack install
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v6
        with:
          pattern: vitest-report-*
          path: .vitest-reports
          merge-multiple: true

      - name: Merge test and coverage reports
        run: >
          pnpm exec vitest --merge-reports --coverage --reporter=default --reporter.default.summary=false

      - name: Verify prerequisite jobs
        if: ${{ always() && (needs.lint.result != 'success' || needs.test-shards.result != 'success') }}
        run: exit 1

      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@v5

  native-host:
    runs-on: ${{ matrix.os }}
    name: Native host (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @scriptcat/native-messaging-host build

      - name: Test
        run: pnpm --filter @scriptcat/native-messaging-host test

  pack-profiles:
    runs-on: ubuntu-latest
    name: Pack profile assertions
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      # A throwaway signing key — CI verifies build-output compliance, it never publishes this
      # artifact, so a real signing key (secrets.CHROME_PEM, used only by packageRelease.yml) is
      # neither needed nor available on pull_request runs.
      - name: Generate throwaway signing key
        run: |
          mkdir -p dist
          openssl genrsa -out ./dist/scriptcat.pem 2048

      - name: store-stable must not contain nativeMessaging or MCP UI strings
        run: SC_PACK_PROFILE=store-stable pnpm run pack

      - name: store-beta must not contain nativeMessaging or MCP UI strings
        run: rm -rf dist/ext && SC_PACK_PROFILE=store-beta pnpm run pack

      - name: developer profile must contain nativeMessaging when SC_ENABLE_MCP=true
        run: rm -rf dist/ext && SC_PACK_PROFILE=developer SC_ENABLE_MCP=true pnpm run pack

  e2e:
    runs-on: ubuntu-latest
    name: Run E2E tests (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup pnpm
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
        run: |
          corepack enable
          corepack install
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Show runner CPU count
        run: nproc

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm test:e2e:install

      - name: Build extension
        run: pnpm build

      - name: Run E2E tests
        run: pnpm exec playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-test-results-${{ matrix.shardIndex }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14
